<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Write</title>

  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: auto;
      padding: 40px;
    }

    input, textarea {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 12px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Write a Post</h1>

<input id="title" placeholder="Title">
<textarea id="text" rows="10" placeholder="Write here..."></textarea>

<button onclick="publish()">Publish</button>

<p id="status"></p>

<script>
async function publish() {
  const title = document.getElementById("title").value;
  const text = document.getElementById("text").value;
  const status = document.getElementById("status");

  if (!title || !text) {
    alert("Fill everything first!");
    return;
  }

  status.innerText = "Publishing...";

  // 🔧 CHANGE THESE
  const username = "SpaceLover-dev";
  const repo = "Harleys-writing";
  const token = "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";

  // Get current posts.json
  const getRes = await fetch(
    `https://api.github.com/repos/${username}/${repo}/contents/posts.json`,
    {
      headers: {
        Authorization: `token ${token}`
      }
    }
  );

  const fileData = await getRes.json();
  const content = JSON.parse(atob(fileData.content));

  // Add new post
  content.push({ title, text });

  // Upload updated file
  const updateRes = await fetch(
    `https://api.github.com/repos/${username}/${repo}/contents/posts.json`,
    {
      method: "PUT",
      headers: {
        Authorization: `token ${token}`
      },
      body: JSON.stringify({
        message: "New post",
        content: btoa(JSON.stringify(content, null, 2)),
        sha: fileData.sha
      })
    }
  );

  if (updateRes.ok) {
    status.innerText = "✅ Published!";
  } else {
    status.innerText = "❌ Error publishing.";
  }
}
</script>

</body>
</html>
