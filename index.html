  <!-- Pretty font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom, #fdf6f9, #f3f7ff);
      color: #2c2c2c;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 60px 20px;

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 48px;

      text-align: center;
      color: #666;
      margin-bottom: 50px;

    }

    .story {
      background: white;
      padding: 20px;
      margin: 20px 0;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .story:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.12);
    }

    a {
      font-size: 22px;
      text-decoration: none;
      color: #333;
      font-weight: 600;
    }

    a:hover {
      color: #7a6cff;
    }

    .summary {
      color: #777;
      font-size: 14px;
      margin-top: 5px;
    }
  </style>
</head>
