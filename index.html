<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Harley’s Writing</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=EB+Garamond&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #f4f1ea;
      font-family: 'EB Garamond', serif;
      color: #2b2b2b;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 70px 25px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 54px;
      text-align: center;
      margin-bottom: 10px;
    }

    .description {
      text-align: center;
      font-size: 18px;
      color: #555;
      margin-bottom: 60px;
      font-style: italic;
    }

    .story {
      background: #fffdf7;
      border: 1px solid #e6e0d4;
      padding: 22px;
      margin: 18px 0;
      border-radius: 10px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    }

    a {
      font-size: 26px;
      text-decoration: none;
      color: #1f1f1f;
      font-weight: 600;
      font-family: 'Playfair Display', serif;
    }

    a:hover {
      text-decoration: underline;
    }

    .summary {
      margin-top: 8px;
      font-size: 16px;
      color: #666;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Harley’s Writing</h1>

  <p class="description">
    A quiet archive of essays and stories.
  </p>

  <!-- STORY LINK -->
  <div class="story">
    <a href="stories/story1/">My First Story</a>
    <p class="summary">A short introduction to something personal.</p>
  </div>

</div>

</body>
</html>
