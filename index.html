<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Harley’s Writing</title>

  <!-- Elegant fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=EB+Garamond&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f4f1ea;
      font-family: 'EB Garamond', serif;
      color: #2b2b2b;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 70px 25px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 54px;
      text-align: center;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .description {
      text-align: center;
      font-size: 18px;
      color: #555;
      margin-bottom: 60px;
      font-style: italic;
    }

    /* STORY CARDS */
    .story {
      background: #fffdf7;
      border: 1px solid #e6e0d4;
      padding: 22px;
      margin: 18px 0;
      border-radius: 10px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .story:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.10);
    }

    a {
      font-size: 26px;
      text-decoration: none;
      color: #1f1f1f;
      font-weight: 600;
      font-family: 'Playfair Display', serif;
    }

    a:hover {
      text-decoration: underline;
    }

    .summary {
      margin-top: 8px;
      font-size: 16px;
      color: #666;
      line-height: 1.6;
    }

    /* subtle divider */
    .divider {
      text-align: center;
      margin: 50px 0;
      color: #bbb;
      letter-spacing: 6px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Harley’s Writing</h1>

  <p class="description">
    A quiet archive of essays, stories, and thoughts.
  </p>

  <div class="divider">✦ ✦ ✦</div>

  <!-- STORY 1 -->
  <div class="story">
    <a href="stories/story1/">My First Story</a>
    <p class="summary">
      A short introduction to something personal, written like a small piece of a larger archive.
    </p>
  </div>

  <!-- STORY 2 -->
  <div class="story">
    <a href="stories/story2/">Another Essay</a>
    <p class="summary">
      A reflection on ideas, memory, or thoughts written in a calm, simple style.
    </p>
  </div>

</div>

</body>
</html>
