<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Website</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: white;
      padding: 60px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 40px;
    }

    header p {
      color: gray;
    }

    .post {
      background: white;
      margin: 20px auto;
      padding: 20px;
      max-width: 700px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }
  </style>
</head>

<body>

<header>
  <h1>Welcome</h1>
  <p>A simple space for writing ✨</p>
</header>

<div id="posts"></div>

<script>
fetch("posts.json")
  .then(res => res.json())
  .then(posts => {
    const container = document.getElementById("posts");

    posts.reverse().forEach(post => {
      container.innerHTML += `
        <div class="post">
          <h2>${post.title}</h2>
          <p>${post.text}</p>
        </div>
      `;
    });
  });
</script>

</body>
</html>
