<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Website</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: white;
      padding: 60px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 42px;
    }

    header p {
      color: gray;
      margin-top: 10px;
    }

    #posts {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .post {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    .post h2 {
      margin-top: 0;
    }
  </style>
</head>

<body>

<header>
  <h1>Welcome</h1>
  <p>A simple professional writing space ✨</p>
</header>

<div id="posts"></div>

<script>
async function loadPosts() {
  const container = document.getElementById("posts");

  try {
    // 1. Get list of all post filenames
    const indexRes = await fetch("posts-index.json");
    const files = await indexRes.json();

    // 2. Load each post file
    for (let i = files.length - 1; i >= 0; i--) {
      const fileName = files[i];

      const postRes = await fetch("posts/" + fileName);
      const post = await postRes.json();

      // 3. Create post card
      const postElement = document.createElement("div");
      postElement.className = "post";

      postElement.innerHTML = `
        <h2>${post.title}</h2>
        <p>${post.text}</p>
      `;

      container.appendChild(postElement);
    }

  } catch (err) {
    console.error("Failed to load posts:", err);
  }
}

loadPosts();
</script>

</body>
</html>
